<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Tyres Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .shift-a { background-color: #dcfce7 !important; color: #15803d !important; border: 2.5px solid #15803d !important; }
        .shift-b { background-color: #dbeafe !important; color: #1d4ed8 !important; border: 2.5px solid #1d4ed8 !important; }
        .shift-c { background-color: #fef9c3 !important; color: #a16207 !important; border: 2.5px solid #a16207 !important; }
        .shift-off { background-color: #f3f4f6 !important; color: #4b5563 !important; border: 2.5px solid #4b5563 !important; }
        .shift-leave { background-color: #fee2e2 !important; color: #b91c1c !important; border: 2.5px solid #b91c1c !important; }
        .shift-holiday { background-color: #f5f3ff !important; color: #6d28d9 !important; border: 2.5px solid #6d28d9 !important; }
        .calendar-day { aspect-ratio: 1 / 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border: 1px solid #e5e7eb; cursor: pointer; border-radius: 14px; margin: 2px; position: relative; }
        .ot-label { position: absolute; top: 2px; right: 4px; color: #ea580c; font-size: 8px; font-weight: 900; }
        .shift-tag { font-size: 9px; font-weight: 900; margin-top: 2px; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 50; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        #botHelperMenu { transition: all 0.2s ease-in-out; transform-origin: top right; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-rose-600 rounded-lg text-white flex items-center justify-center font-black text-xl shadow-lg">A</div>
            <div>
                <h1 class="font-extrabold text-gray-800 leading-none">Apollo Tyres</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Attendance Manager</p>
            </div>
        </div>
        <button onclick="openSettings()" class="p-2 bg-gray-100 rounded-xl text-lg hover:bg-gray-200 transition-colors">⚙️</button>
    </header>

    <main class="max-w-md mx-auto px-3 mt-4">
        <div class="flex justify-between items-center mb-4 bg-white p-2 rounded-2xl shadow-sm border border-gray-100">
            <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-xl text-rose-600 font-bold">←</button>
            <h2 id="monthDisplay" class="font-extrabold text-gray-700"></h2>
            <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-xl text-rose-600 font-bold">→</button>
        </div>
        
        <div id="calendarGrid" class="bg-white rounded-3xl shadow-sm p-3 mb-6 border border-gray-100 grid grid-cols-7 text-center text-xs"></div>
        
        <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-rose-500 mb-6 text-center">
            <div class="grid grid-cols-5 gap-2 text-[10px] font-bold">
                <div class="p-2 bg-blue-50 rounded-lg"><p>DUTY</p><p id="statDuty" class="text-lg font-black text-blue-700">0</p></div>
                <div class="p-2 bg-orange-50 rounded-lg"><p>OT</p><p id="statOt" class="text-lg font-black text-orange-700">0</p></div>
                <div class="p-2 bg-gray-50 rounded-lg"><p>OFF</p><p id="statOff" class="text-lg font-black text-gray-700">0</p></div>
                <div class="p-2 bg-purple-50 rounded-lg"><p>HOLI</p><p id="statHoliday" class="text-lg font-black text-purple-700">0</p></div>
                <div class="p-2 bg-red-50 rounded-lg"><p>LEAVE</p><p id="statLeave" class="text-lg font-black text-red-700">0</p></div>
            </div>
        </div>
    </main>

    <div id="settingsModal" class="modal px-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-7 shadow-2xl max-h-[90vh] overflow-y-auto text-gray-800">
            
            <div class="flex justify-between items-center mb-6 relative">
                <h3 class="font-black text-xl flex-1 text-center ml-10">⚙️ Settings</h3>
                
                <button onclick="toggleBotHelper()" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-xl shadow-sm border border-blue-100 active:scale-90 transition-transform">
                    🤖
                </button>
                
                <div id="botHelperMenu" class="hidden absolute top-12 right-0 w-48 bg-white rounded-2xl shadow-2xl border border-gray-100 z-50 overflow-hidden ring-4 ring-black ring-opacity-5">
                    <a href="https://t.me/userinfobot" target="_blank" class="flex items-center gap-2 p-3 text-[10px] font-bold text-gray-700 hover:bg-blue-50 border-b border-gray-50">
                        🔍 Find My Chat ID
                    </a>
                    <a href="https://t.me/@Jefin143_bot" id="botLink" target="_blank" class="flex items-center gap-3 p-3 text-[10px] font-bold text-gray-700 hover:bg-blue-50">
                        🤖 Open Backup Bot
                    </a>
                </div>
            </div>
            
            <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100 mb-4 shadow-inner">
                <p class="text-[10px] font-bold text-blue-700 mb-2 uppercase text-center tracking-widest">Telegram Backup</p>
                <input type="text" id="userChatId" class="w-full p-2 mb-3 text-xs border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Chat ID നൽകുക">
                <button onclick="saveChatId()" class="w-full py-2 bg-blue-500 text-white rounded-lg font-bold text-xs mb-3 shadow-md active:scale-95 transition-transform">Save Chat ID</button>
                <button onclick="backupToTelegram()" class="w-full py-3 bg-blue-700 text-white rounded-xl font-black flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
                    <span>📤</span> Manual Backup
                </button>
                <p id="lastBackupText" class="text-[9px] text-gray-500 mt-2 text-center italic"></p>
            </div>

            <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-4">
                <h4 class="font-bold text-sm text-gray-700 mb-3 underline decoration-gray-300">Range Report</h4>
                <div class="flex gap-2 mb-3">
                    <input type="month" id="rangeFrom" class="w-1/2 p-2 text-xs border rounded-lg outline-none">
                    <input type="month" id="rangeTo" class="w-1/2 p-2 text-xs border rounded-lg outline-none">
                </div>
                <button onclick="calculateRange()" class="w-full py-2 bg-slate-800 text-white rounded-lg font-black text-xs active:scale-95">View Report</button>
                <div id="rangeResults" class="hidden mt-3 grid grid-cols-2 gap-2 text-[10px] font-bold p-3 bg-white rounded-xl border border-gray-100 shadow-inner">
                    <p>Duty: <span id="rDuty" class="text-blue-600">0</span></p><p>OT: <span id="rOt" class="text-orange-600">0</span></p>
                    <p>Off: <span id="rOff" class="text-gray-600">0</span></p><p>Holi: <span id="rHoliday" class="text-purple-600">0</span></p>
                    <p class="col-span-2">Leave: <span id="rLeave" class="text-red-600">0</span></p>
                </div>
            </div>

            <div class="p-4 bg-green-50 rounded-2xl border border-green-200 mb-4 text-center">
                <input type="file" id="restoreFile" class="hidden" accept=".html" onchange="handleRestore(event)">
                <button onclick="document.getElementById('restoreFile').click()" class="w-full py-3 bg-white border-2 border-green-300 text-green-700 rounded-xl font-black text-xs hover:bg-green-100 transition-colors">📥 Restore Backup File</button>
                <p class="text-[8px] text-gray-400 mt-2 italic">Restore ചെയ്യുമ്പോൾ Chat ID-യും തിരികെ വരും.</p>
            </div>

            <button onclick="closeModal('settingsModal')" class="w-full py-3 bg-gray-100 text-gray-500 rounded-xl font-black">Close</button>
        </div>
    </div>

    <div id="dayModal" class="modal px-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl">
            <h3 id="selectedDateTitle" class="font-black text-xl mb-4 text-center"></h3>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setShift('A', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">A Shift</button>
                <button onclick="setShift('B', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">B Shift</button>
                <button onclick="setShift('C', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">C Shift</button>
                <button onclick="setShift('OFF', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold">OFF</button>
                <button onclick="setShift('LEAVE', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold text-red-600">LEAVE</button>
                <button onclick="setShift('HOLIDAY', this)" class="shift-btn p-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-xs font-bold text-purple-600">HOLIDAY</button>
            </div>
            <label class="flex items-center gap-2 p-3 bg-orange-50 rounded-xl border border-orange-200 mb-4 cursor-pointer">
                <input type="checkbox" id="otCheck" class="w-5 h-5 accent-orange-600">
                <span class="text-sm font-bold text-orange-900">Over Time (OT)</span>
            </label>
            <textarea id="dayNote" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm mb-4 outline-none" placeholder="കുറിപ്പുകൾ..."></textarea>
            <div class="flex gap-2">
                <button onclick="deleteEntry()" class="w-1/4 py-3 text-red-400 font-bold text-sm">Clear</button>
                <button onclick="saveAttendance()" class="w-3/4 py-3 bg-rose-600 text-white rounded-xl font-black shadow-lg">Save</button>
            </div>
        </div>
    </div>

    <script>
        const commonBotToken = '7909722913:AAEQhIp7o5WhVSZUjgLYA8qAO25FPmj6s0o'; 
        const botUsername = "@Jefin143_bot"; // നിങ്ങളുടെ ബോട്ടിന്റെ Username
        
        let currentDate = new Date();
        let attendanceData = JSON.parse(localStorage.getItem('apollo_attendance') || '{}');
        let selectedKey = null, activeShift = null;
        const monthsML = ["ജനുവരി", "ഫെബ്രുവരി", "മാർച്ച്", "ഏപ്രിൽ", "മേയ്", "ജൂൺ", "ജൂലൈ", "ഓഗസ്റ്റ്", "സെപ്റ്റംബർ", "ഒക്ടോബർ", "നവംബർ", "ഡിസംബർ"];

        // --- Bot Helper UI Logic ---
        function toggleBotHelper() {
            const menu = document.getElementById('botHelperMenu');
            menu.classList.toggle('hidden');
            document.getElementById('botLink').href = `https://t.me/${botUsername}`;
        }

        // --- Weekly Auto Backup Logic ---
        async function checkWeeklyBackup() {
            const lastBackup = localStorage.getItem('apollo_last_backup');
            const today = new Date();
            if (lastBackup) {
                const lastDate = new Date(lastBackup);
                const diffInDays = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));
                if (diffInDays >= 7) await autoBackupToTelegram();
            } else {
                localStorage.setItem('apollo_last_backup', today.toISOString());
            }
            updateBackupStatus();
        }

        async function autoBackupToTelegram() {
            const id = localStorage.getItem('apollo_chat_id');
            if(!id) return;
            const data = localStorage.getItem('apollo_attendance') || '{}';
            const backupData = JSON.stringify({ attendance: data, chatId: id });
            const fileHTML = `<!DOCTYPE html><html><body><div id="dataStore" style="display:none;">${backupData}</div><p>Apollo Auto Backup</p></body></html>`;
            const formData = new FormData();
            formData.append('chat_id', id); 
            formData.append('document', new Blob([fileHTML], {type:'text/html'}), `Auto_Backup_${new Date().toISOString().slice(0,10)}.html`);
            try { 
                const res = await fetch(`https://api.telegram.org/bot${commonBotToken}/sendDocument`, {method:'POST', body:formData}); 
                if(res.ok) localStorage.setItem('apollo_last_backup', new Date().toISOString());
            } catch(e) { console.error("Auto backup failed"); }
        }

        function updateBackupStatus() {
            const last = localStorage.getItem('apollo_last_backup');
            if(last) document.getElementById('lastBackupText').innerText = `Last Backup: ${new Date(last).toLocaleDateString()}`;
        }

        // --- Range Report Logic ---
        function calculateRange() {
            const f = document.getElementById('rangeFrom').value, t = document.getElementById('rangeTo').value;
            if(!f || !t) return alert("Select months");
            let s = { d:0, o:0, f:0, h:0, l:0 };
            Object.keys(attendanceData).forEach(k => { 
                const m = k.substring(0,7); 
                if(m >= f && m <= t) { 
                    const d = attendanceData[k]; 
                    if(['A','B','C'].includes(d.shift)) s.d++; 
                    if(d.ot) s.o++; if(d.shift==='OFF') s.f++; if(d.shift==='HOLIDAY') s.h++; if(d.shift==='LEAVE') s.l++; 
                } 
            });
            document.getElementById('rDuty').innerText=s.d; document.getElementById('rOt').innerText=s.o;
            document.getElementById('rOff').innerText=s.f; document.getElementById('rHoliday').innerText=s.h;
            document.getElementById('rLeave').innerText=s.l;
            document.getElementById('rangeResults').classList.remove('hidden');
        }

        // --- Core Functions ---
        function saveChatId() {
            const id = document.getElementById('userChatId').value;
            if(id) { localStorage.setItem('apollo_chat_id', id); alert("Chat ID സേവ് ചെയ്തു! ✅"); }
        }

        async function backupToTelegram() {
            const id = localStorage.getItem('apollo_chat_id');
            if(!id) return alert("Settings-ൽ Chat ID നൽകുക!");
            const data = localStorage.getItem('apollo_attendance') || '{}';
            const backupData = JSON.stringify({ attendance: data, chatId: id });
            const fileHTML = `<!DOCTYPE html><html><body><div id="dataStore" style="display:none;">${backupData}</div><p>Apollo Full Backup</p></body></html>`;
            const formData = new FormData();
            formData.append('chat_id', id); 
            formData.append('document', new Blob([fileHTML], {type:'text/html'}), `Apollo_Backup_${new Date().toISOString().slice(0,10)}.html`);
            try { 
                const res = await fetch(`https://api.telegram.org/bot${commonBotToken}/sendDocument`, {method:'POST', body:formData}); 
                if(res.ok) {
                    alert('ബാക്കപ്പ് അയച്ചു! ✅');
                    localStorage.setItem('apollo_last_backup', new Date().toISOString());
                    updateBackupStatus();
                } else alert('ID ശരിയാണോ എന്ന് പരിശോധിക്കുക.');
            } catch(e) { alert('Telegram Connection Error!'); }
        }

        function handleRestore(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
                    const parsed = JSON.parse(doc.getElementById('dataStore').innerText);
                    localStorage.setItem('apollo_attendance', parsed.attendance);
                    if(parsed.chatId) {
                        localStorage.setItem('apollo_chat_id', parsed.chatId);
                    }
                    alert('വിജയകരമായി Restore ചെയ്തു! ✅'); location.reload();
                } catch(err) { alert('Invalid File! ❌'); }
            };
            reader.readAsText(file);
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            document.getElementById('monthDisplay').innerText = `${monthsML[month]} ${year}`;
            grid.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="font-black text-gray-400 py-2 uppercase">${d}</div>`).join('');
            const first = new Date(year, month, 1).getDay(), days = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= days; d++) {
                const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const data = attendanceData[key];
                const el = document.createElement('div');
                el.className = `calendar-day ${data ? 'shift-' + data.shift.toLowerCase() : ''}`;
                let label = data ? (data.shift === 'LEAVE' ? 'L' : data.shift === 'HOLIDAY' ? 'HD' : data.shift) : '';
                el.innerHTML = `<span class="text-sm font-black">${d}</span><span class="shift-tag">${label}</span>${data && data.ot ? '<span class="ot-label">OT</span>' : ''}`;
                el.onclick = () => openDay(key, d);
                grid.appendChild(el);
            }
            updateStats();
        }

        function openDay(key, d) {
            selectedKey = key; const data = attendanceData[key] || {};
            document.getElementById('selectedDateTitle').innerText = `${d} ${monthsML[currentDate.getMonth()]}`;
            document.getElementById('otCheck').checked = !!data.ot;
            document.getElementById('dayNote').value = data.note || '';
            activeShift = data.shift || null;
            document.querySelectorAll('.shift-btn').forEach(b => b.style.borderColor = b.innerText.split(' ')[0] === activeShift ? '#e11d48' : '#f3f4f6');
            document.getElementById('dayModal').classList.add('active');
        }

        function setShift(s, btn) {
            activeShift = s;
            document.querySelectorAll('.shift-btn').forEach(b => b.style.borderColor = '#f3f4f6');
            btn.style.borderColor = '#e11d48';
        }

        function saveAttendance() {
            if(!activeShift) return alert("Shift തിരഞ്ഞെടുക്കുക");
            attendanceData[selectedKey] = { shift: activeShift, ot: document.getElementById('otCheck').checked, note: document.getElementById('dayNote').value };
            localStorage.setItem('apollo_attendance', JSON.stringify(attendanceData));
            renderCalendar(); closeModal('dayModal');
        }

        function deleteEntry() { 
            if(confirm("Delete?")) { delete attendanceData[selectedKey]; localStorage.setItem('apollo_attendance', JSON.stringify(attendanceData)); renderCalendar(); closeModal('dayModal'); } 
        }

        function updateStats() {
            const m = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
            let s = { duty: 0, ot: 0, off: 0, hol: 0, lea: 0 };
            Object.keys(attendanceData).forEach(k => { if(k.startsWith(m)) { const d = attendanceData[k]; if(['A','B','C'].includes(d.shift)) s.duty++; if(d.ot) s.ot++; if(d.shift==='OFF') s.off++; if(d.shift==='HOLIDAY') s.hol++; if(d.shift==='LEAVE') s.lea++; } });
            document.getElementById('statDuty').innerText=s.duty; document.getElementById('statOt').innerText=s.ot; document.getElementById('statOff').innerText=s.off; document.getElementById('statHoliday').innerText=s.hol; document.getElementById('statLeave').innerText=s.lea;
        }

        function changeMonth(d) { currentDate.setMonth(currentDate.getMonth() + d); renderCalendar(); }
        function openSettings() { document.getElementById('settingsModal').classList.add('active'); }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
            document.getElementById('botHelperMenu').classList.add('hidden'); // മെനുവും അടയ്ക്കുന്നു
        }
        
        window.onload = () => {
            renderCalendar();
            document.getElementById('userChatId').value = localStorage.getItem('apollo_chat_id') || '';
            checkWeeklyBackup();
        };
    </script>
</body>
</html>
